services:
  postgres:
    image: postgres:16-alpine
    container_name: icp_training_db
    environment:
      POSTGRES_USER: icp_user
      POSTGRES_PASSWORD: training_password
      POSTGRES_DB: icp_training
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icp_user -d icp_training"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: icp_training_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@training.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
