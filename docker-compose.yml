services:
  postgres:
    image: postgres:16-alpine
    container_name: icp_training_db
    environment:
      POSTGRES_USER: icp_user
      POSTGRES_PASSWORD: training_password
      POSTGRES_DB: icp_training
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icp_user -d icp_training"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: icp_training_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@training.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: icp_training_jupyter
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-training}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: icp_training
      DB_USER: icp_user
      DB_PASSWORD: training_password
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./resources:/home/jovyan/resources
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
